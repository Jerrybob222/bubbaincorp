<div id="navbar-container"></div>
<script>

  fetch("/navbar.html")

    .then(data => {
      document.getElementById("navbar-container").innerHTML = data;
    })
    .catch(err => console.error("Navbar failed to load:", err));



    function loadNavbar() {
  fetch("/navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar-container").innerHTML = data;
      initNavbarDropdown();
    });
}

document.addEventListener("DOMContentLoaded", loadNavbar);

</script>
